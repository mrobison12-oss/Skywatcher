<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyWatcher</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: monospace;
      padding: 2rem;
      font-size: 14px;
    }
    h1 { color: #38bdf8; margin-bottom: 0.25rem; }
    .meta { color: #64748b; margin-bottom: 2rem; font-size: 12px; }
    .section { margin-bottom: 2rem; }
    .section h2 { color: #94a3b8; font-size: 13px; text-transform: uppercase;
                  letter-spacing: 0.1em; border-bottom: 1px solid #1e293b;
                  padding-bottom: 0.5rem; margin-bottom: 1rem; }
    .alert-card { background: #1e293b; border-left: 4px solid #ef4444;
                  padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
    .alert-card.watch { border-left-color: #f59e0b; }
    .alert-card.advisory { border-left-color: #3b82f6; }
    .alert-title { font-weight: bold; color: #f1f5f9; margin-bottom: 0.5rem; }
    .alert-meta { color: #94a3b8; font-size: 12px; }
    .clear { background: #052e16; border-left: 4px solid #22c55e;
             padding: 1rem; border-radius: 4px; color: #86efac; }
    .coords { background: #1e293b; padding: 1rem; border-radius: 4px;
              color: #7dd3fc; margin-bottom: 1rem; }
    .error { background: #2d1515; border-left: 4px solid #ef4444;
             padding: 1rem; border-radius: 4px; color: #fca5a5; }
    .loading { color: #64748b; }
    .in-polygon { background: #2d0f0f; border: 1px solid #ef4444;
                  padding: 0.25rem 0.75rem; border-radius: 9999px;
                  font-size: 11px; color: #fca5a5; display: inline-block;
                  margin-top: 0.5rem; }
    .outside-polygon { background: #1a2a1a; border: 1px solid #4ade80;
                       padding: 0.25rem 0.75rem; border-radius: 9999px;
                       font-size: 11px; color: #86efac; display: inline-block;
                       margin-top: 0.5rem; }
    .timestamp { color: #475569; font-size: 11px; margin-top: 2rem; }
  </style>
</head>
<body>

<h1>SkyWatcher</h1>
<div class="meta">Phase 1 — Data Pipeline Verification</div>

<div class="coords">
  📍 Home: 42.3469875, -85.7213594 (Alamo Township, MI)
</div>

<div class="section">
  <h2>NWS Grid Info</h2>
  <div id="grid-info" class="loading">Fetching grid data...</div>
</div>

<div class="section">
  <h2>Active Alerts — Point-in-Polygon Test</h2>
  <div id="alerts" class="loading">Fetching alerts...</div>
</div>

<div class="timestamp" id="timestamp"></div>

<script>
  const LAT = 42.3469875;
  const LON = -85.7213594;
  const NWS_USER_AGENT = 'SkyWatcher/1.0 (skywatcher-app)';

  // ── Point-in-polygon (Ray Casting algorithm) ──────────────────────────────
  function pointInPolygon(lat, lon, polygon) {
    // polygon is an array of [lon, lat] pairs (GeoJSON order)
    let inside = false;
    const x = lon, y = lat;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      const xi = polygon[i][0], yi = polygon[i][1];
      const xj = polygon[j][0], yj = polygon[j][1];
      const intersect = ((yi > y) !== (yj > y)) &&
                        (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  // ── Check if home is inside any polygon in a GeoJSON geometry ────────────
  function homeInGeometry(geometry) {
    if (!geometry) return false;

    if (geometry.type === 'Polygon') {
      return pointInPolygon(LAT, LON, geometry.coordinates[0]);
    }

    if (geometry.type === 'MultiPolygon') {
      return geometry.coordinates.some(poly =>
        pointInPolygon(LAT, LON, poly[0])
      );
    }

    return false;
  }

  // ── Classify alert severity for styling ──────────────────────────────────
  function alertClass(event) {
    const e = (event || '').toLowerCase();
    if (e.includes('warning')) return 'warning';
    if (e.includes('watch'))   return 'watch';
    return 'advisory';
  }

  // ── Format expiration time ────────────────────────────────────────────────
  function formatExpiry(isoString) {
    if (!isoString) return 'No expiry';
    const d = new Date(isoString);
    return d.toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
    });
  }

  // ── Fetch NWS grid metadata ───────────────────────────────────────────────
  async function fetchGridInfo() {
    const el = document.getElementById('grid-info');
    try {
      const res = await fetch(
        `https://api.weather.gov/points/${LAT},${LON}`,
        { headers: { 'User-Agent': NWS_USER_AGENT, 'Accept': 'application/geo+json' } }
      );
      if (!res.ok) throw new Error(`NWS returned ${res.status}`);
      const data = await res.json();
      const p = data.properties;
      el.innerHTML = `
        <div class="coords">
          Office: <strong>${p.cwa}</strong> &nbsp;|&nbsp;
          Grid: ${p.gridX}, ${p.gridY} &nbsp;|&nbsp;
          Zone: ${p.forecastZone?.split('/').pop() || 'N/A'} &nbsp;|&nbsp;
          County: ${p.county?.split('/').pop() || 'N/A'}<br>
          <small style="color:#64748b">Forecast URL: ${p.forecast}</small>
        </div>`;
    } catch (err) {
      el.innerHTML = `<div class="error">⚠ Grid fetch failed: ${err.message}</div>`;
    }
  }

  // ── Fetch active alerts ───────────────────────────────────────────────────
  async function fetchAlerts() {
    const el = document.getElementById('alerts');
    try {
      const res = await fetch(
        `https://api.weather.gov/alerts/active?point=${LAT},${LON}`,
        { headers: { 'User-Agent': NWS_USER_AGENT, 'Accept': 'application/geo+json' } }
      );
      if (!res.ok) throw new Error(`NWS returned ${res.status}`);
      const data = await res.json();
      const alerts = data.features || [];

      if (alerts.length === 0) {
        el.innerHTML = `<div class="clear">
          ✅ No active watches, warnings, or advisories for this location.
        </div>`;
        return;
      }

      // Sort: warnings first, then watches, then advisories
      const order = { warning: 0, watch: 1, advisory: 2 };
      alerts.sort((a, b) => {
        const ac = alertClass(a.properties.event);
        const bc = alertClass(b.properties.event);
        return (order[ac] ?? 3) - (order[bc] ?? 3);
      });

      el.innerHTML = alerts.map(alert => {
        const p = alert.properties;
        const geo = alert.geometry;
        const inPoly = homeInGeometry(geo);
        const polyBadge = geo
          ? (inPoly
              ? '<span class="in-polygon">⚠ Home is INSIDE this alert polygon</span>'
              : '<span class="outside-polygon">✓ Home is outside this polygon</span>')
          : '<span style="color:#64748b;font-size:11px">No polygon data</span>';

        return `
          <div class="alert-card ${alertClass(p.event)}">
            <div class="alert-title">${p.event}</div>
            <div class="alert-meta">
              ${p.headline || p.description?.substring(0, 120) || 'No headline'}
            </div>
            <div class="alert-meta" style="margin-top:0.5rem">
              Expires: ${formatExpiry(p.expires)}
            </div>
            ${polyBadge}
          </div>`;
      }).join('');

    } catch (err) {
      el.innerHTML = `<div class="error">⚠ Alert fetch failed: ${err.message}<br>
        <small>Check browser console for details.</small></div>`;
    }
  }

  // ── Run ───────────────────────────────────────────────────────────────────
  async function init() {
    document.getElementById('timestamp').textContent =
      `Last checked: ${new Date().toLocaleString()}`;
    await Promise.all([fetchGridInfo(), fetchAlerts()]);
  }

  init();
  // Refresh every 60 seconds
  setInterval(init, 60000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyWatcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: monospace;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Grid layout ─────────────────────────────────────────── */
    .dashboard {
      display: grid;
      grid-template-columns: 35fr 35fr 30fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      gap: 0;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1e293b;
      background: #0f172a;
    }
    .header h1 { color: #38bdf8; font-size: 18px; }
    .header .phase { color: #64748b; font-size: 12px; margin-left: 0.75rem; }
    .header .timestamp { color: #475569; font-size: 11px; }

    /* ── Columns ─────────────────────────────────────────────── */
    .col {
      padding: 0.75rem;
      overflow-y: auto;
      border-right: 1px solid #1e293b;
    }
    .col:last-child { border-right: none; }

    .col-header {
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
    }

    /* ── Alert cards ─────────────────────────────────────────── */
    .alert-card {
      background: #1e293b;
      border-left: 4px solid #ef4444;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 4px;
    }
    .alert-card.watch { border-left-color: #f59e0b; }
    .alert-card.advisory { border-left-color: #3b82f6; }
    .alert-title { font-weight: bold; color: #f1f5f9; margin-bottom: 0.25rem; font-size: 13px; }
    .alert-meta { color: #94a3b8; font-size: 11px; line-height: 1.4; }
    .clear {
      background: #052e16; border-left: 4px solid #22c55e;
      padding: 0.75rem; border-radius: 4px; color: #86efac; font-size: 12px;
    }

    .in-polygon {
      background: #2d0f0f; border: 1px solid #ef4444;
      padding: 0.15rem 0.5rem; border-radius: 9999px;
      font-size: 10px; color: #fca5a5; display: inline-block; margin-top: 0.35rem;
    }
    .outside-polygon {
      background: #1a2a1a; border: 1px solid #4ade80;
      padding: 0.15rem 0.5rem; border-radius: 9999px;
      font-size: 10px; color: #86efac; display: inline-block; margin-top: 0.35rem;
    }

    /* ── Status panel (center column) ────────────────────────── */
    .status-card {
      background: #1e293b;
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    .status-card .label { color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .status-card .value { color: #7dd3fc; font-size: 13px; }
    .status-card .value strong { color: #38bdf8; }

    /* ── Timeline ────────────────────────────────────────────── */
    .timeline-col {
      padding: 0.75rem 0.5rem;
      overflow-y: auto;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 44px 1fr 40px 6px;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      border-radius: 3px;
      height: 27px;
      font-size: 11px;
    }
    .timeline-row.now {
      background: #1e293b;
      outline: 1px solid #38bdf8;
      outline-offset: -1px;
    }
    .timeline-hour { color: #94a3b8; font-size: 11px; white-space: nowrap; }
    .timeline-row.now .timeline-hour { color: #38bdf8; font-weight: bold; }
    .timeline-cond { color: #cbd5e1; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .timeline-temp { color: #e2e8f0; font-size: 11px; text-align: right; }
    .timeline-bar {
      width: 6px;
      height: 20px;
      border-radius: 2px;
      background: #22c55e;
    }
    .timeline-bar.warning { background: #ef4444; }
    .timeline-bar.watch { background: #f59e0b; }
    .timeline-bar.advisory { background: #3b82f6; }
    .timeline-bar.precip { background: #475569; }

    /* ── Error / Loading ─────────────────────────────────────── */
    .error {
      background: #2d1515; border-left: 4px solid #ef4444;
      padding: 0.75rem; border-radius: 4px; color: #fca5a5; font-size: 12px;
    }
    .loading { color: #64748b; font-size: 12px; }

    /* ── Portrait fallback (stack columns) ───────────────────── */
    @media (max-width: 700px) {
      .dashboard {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
        height: auto;
        overflow-y: auto;
      }
      .col { border-right: none; border-bottom: 1px solid #1e293b; }
      body { overflow: auto; }
    }
  </style>
</head>
<body>

<div class="dashboard">
  <!-- Header -->
  <div class="header">
    <div>
      <h1 style="display:inline">SkyWatcher</h1>
      <span class="phase">Phase 2</span>
    </div>
    <div class="timestamp" id="timestamp">Loading...</div>
  </div>

  <!-- Left Column: Alerts -->
  <div class="col" id="col-alerts">
    <div class="col-header">Active Alerts</div>
    <div id="alerts" class="loading">Fetching alerts...</div>
  </div>

  <!-- Center Column: Status & Info -->
  <div class="col" id="col-status">
    <div class="col-header">Status</div>

    <div class="status-card">
      <div class="label">Home Location</div>
      <div class="value">42.3469875, -85.7213594<br><span style="color:#64748b;font-size:11px">Alamo Township, MI</span></div>
    </div>

    <div class="status-card">
      <div class="label">NWS Grid</div>
      <div class="value" id="grid-info"><span class="loading">Fetching...</span></div>
    </div>

    <div class="status-card">
      <div class="label">Threat Summary</div>
      <div class="value" id="threat-summary"><span class="loading">Calculating...</span></div>
    </div>
  </div>

  <!-- Right Column: Timeline -->
  <div class="col timeline-col" id="col-timeline">
    <div class="col-header">24-Hour Threat Timeline</div>
    <div id="timeline" class="loading">Fetching forecast...</div>
  </div>
</div>

<script>
  const LAT = 42.3469875;
  const LON = -85.7213594;
  const NWS_USER_AGENT = 'SkyWatcher/1.0 (skywatcher-app)';

  // Cache grid info so we only fetch once (it never changes)
  let gridCache = null;

  // Store alerts globally so timeline can reference them
  let activeAlerts = [];

  // ── Point-in-polygon (Ray Casting) ────────────────────────────────────────
  function pointInPolygon(lat, lon, polygon) {
    let inside = false;
    const x = lon, y = lat;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      const xi = polygon[i][0], yi = polygon[i][1];
      const xj = polygon[j][0], yj = polygon[j][1];
      const intersect = ((yi > y) !== (yj > y)) &&
                        (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function homeInGeometry(geometry) {
    if (!geometry) return false;
    if (geometry.type === 'Polygon') {
      return pointInPolygon(LAT, LON, geometry.coordinates[0]);
    }
    if (geometry.type === 'MultiPolygon') {
      return geometry.coordinates.some(poly => pointInPolygon(LAT, LON, poly[0]));
    }
    return false;
  }

  // ── Alert classification ──────────────────────────────────────────────────
  function alertClass(event) {
    const e = (event || '').toLowerCase();
    if (e.includes('warning')) return 'warning';
    if (e.includes('watch'))   return 'watch';
    return 'advisory';
  }

  function formatExpiry(isoString) {
    if (!isoString) return 'No expiry';
    const d = new Date(isoString);
    return d.toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
    });
  }

  // ── Determine highest alert severity active during a given hour ───────────
  function alertSeverityAtHour(hourStart) {
    const hourEnd = new Date(hourStart.getTime() + 3600000);
    const severityOrder = { warning: 0, watch: 1, advisory: 2 };
    let highest = null;

    for (const alert of activeAlerts) {
      const p = alert.properties;
      const effective = new Date(p.effective || p.sent);
      const expires = p.expires ? new Date(p.expires) : new Date(effective.getTime() + 86400000);

      // Check if alert overlaps this hour
      if (effective < hourEnd && expires > hourStart) {
        const cls = alertClass(p.event);
        if (highest === null || severityOrder[cls] < severityOrder[highest]) {
          highest = cls;
        }
      }
    }
    return highest;
  }

  // ── Fetch NWS grid metadata ───────────────────────────────────────────────
  async function fetchGridInfo() {
    const el = document.getElementById('grid-info');
    try {
      if (gridCache) {
        renderGrid(el, gridCache);
        return gridCache;
      }
      const res = await fetch(
        `https://api.weather.gov/points/${LAT},${LON}`,
        { headers: { 'User-Agent': NWS_USER_AGENT, 'Accept': 'application/geo+json' } }
      );
      if (!res.ok) throw new Error(`NWS returned ${res.status}`);
      const data = await res.json();
      gridCache = data.properties;
      renderGrid(el, gridCache);
      return gridCache;
    } catch (err) {
      el.innerHTML = `<span class="error">Grid fetch failed: ${err.message}</span>`;
      return null;
    }
  }

  function renderGrid(el, p) {
    el.innerHTML = `
      Office: <strong>${p.cwa}</strong> &nbsp;|&nbsp;
      Grid: ${p.gridX}, ${p.gridY}<br>
      Zone: ${p.forecastZone?.split('/').pop() || 'N/A'} &nbsp;|&nbsp;
      County: ${p.county?.split('/').pop() || 'N/A'}`;
  }

  // ── Fetch active alerts ───────────────────────────────────────────────────
  async function fetchAlerts() {
    const el = document.getElementById('alerts');
    try {
      const res = await fetch(
        `https://api.weather.gov/alerts/active?point=${LAT},${LON}`,
        { headers: { 'User-Agent': NWS_USER_AGENT, 'Accept': 'application/geo+json' } }
      );
      if (!res.ok) throw new Error(`NWS returned ${res.status}`);
      const data = await res.json();
      activeAlerts = data.features || [];

      if (activeAlerts.length === 0) {
        el.innerHTML = `<div class="clear">No active watches, warnings, or advisories.</div>`;
        updateThreatSummary();
        return;
      }

      const order = { warning: 0, watch: 1, advisory: 2 };
      activeAlerts.sort((a, b) => {
        const ac = alertClass(a.properties.event);
        const bc = alertClass(b.properties.event);
        return (order[ac] ?? 3) - (order[bc] ?? 3);
      });

      el.innerHTML = activeAlerts.map(alert => {
        const p = alert.properties;
        const geo = alert.geometry;
        const inPoly = homeInGeometry(geo);
        const polyBadge = geo
          ? (inPoly
              ? '<span class="in-polygon">HOME INSIDE POLYGON</span>'
              : '<span class="outside-polygon">Outside polygon</span>')
          : '<span style="color:#64748b;font-size:10px">Zone-based (no polygon)</span>';

        return `
          <div class="alert-card ${alertClass(p.event)}">
            <div class="alert-title">${p.event}</div>
            <div class="alert-meta">
              ${p.headline || p.description?.substring(0, 100) || 'No headline'}
            </div>
            <div class="alert-meta" style="margin-top:0.25rem">
              Expires: ${formatExpiry(p.expires)}
            </div>
            ${polyBadge}
          </div>`;
      }).join('');

      updateThreatSummary();

    } catch (err) {
      el.innerHTML = `<div class="error">Alert fetch failed: ${err.message}</div>`;
      activeAlerts = [];
      updateThreatSummary();
    }
  }

  // ── Threat summary (center column) ────────────────────────────────────────
  function updateThreatSummary() {
    const el = document.getElementById('threat-summary');
    if (activeAlerts.length === 0) {
      el.innerHTML = '<span style="color:#86efac">All clear — no active alerts</span>';
      return;
    }

    const warnings = activeAlerts.filter(a => alertClass(a.properties.event) === 'warning').length;
    const watches  = activeAlerts.filter(a => alertClass(a.properties.event) === 'watch').length;
    const advisories = activeAlerts.filter(a => alertClass(a.properties.event) === 'advisory').length;

    const parts = [];
    if (warnings)   parts.push(`<span style="color:#ef4444">${warnings} warning${warnings > 1 ? 's' : ''}</span>`);
    if (watches)    parts.push(`<span style="color:#f59e0b">${watches} watch${watches > 1 ? 'es' : ''}</span>`);
    if (advisories) parts.push(`<span style="color:#3b82f6">${advisories} advisory</span>`);

    el.innerHTML = parts.join(' &nbsp; ');
  }

  // ── Fetch hourly forecast ─────────────────────────────────────────────────
  async function fetchHourlyForecast(gridProps) {
    try {
      const gridX = gridProps ? gridProps.gridX : 41;
      const gridY = gridProps ? gridProps.gridY : 19;
      const cwa = gridProps ? gridProps.cwa : 'GRR';

      const res = await fetch(
        `https://api.weather.gov/gridpoints/${cwa}/${gridX},${gridY}/forecast/hourly`,
        { headers: { 'User-Agent': NWS_USER_AGENT, 'Accept': 'application/geo+json' } }
      );
      if (!res.ok) throw new Error(`NWS returned ${res.status}`);
      const data = await res.json();
      return data.properties.periods || [];
    } catch (err) {
      return null;
    }
  }

  // ── Render timeline ───────────────────────────────────────────────────────
  function renderTimeline(periods) {
    const el = document.getElementById('timeline');
    const now = new Date();
    const currentHour = now.getHours();

    // If forecast fetch failed, render alert-only timeline
    if (!periods) {
      renderAlertOnlyTimeline(el, now, currentHour);
      return;
    }

    // Take first 24 periods
    const hours = periods.slice(0, 24);

    el.innerHTML = hours.map((period, i) => {
      const startTime = new Date(period.startTime);
      const hour = startTime.getHours();
      const isNow = i === 0;

      // Format hour label
      const hourLabel = isNow ? 'NOW' : formatHourLabel(hour);

      // Temperature
      const temp = `${period.temperature}°`;

      // Short condition
      const cond = shortenCondition(period.shortForecast);

      // Determine bar color: alert severity wins, else precip check
      const severity = alertSeverityAtHour(startTime);
      let barClass = '';
      if (severity) {
        barClass = severity;
      } else if (period.probabilityOfPrecipitation?.value >= 30) {
        barClass = 'precip';
      }

      return `
        <div class="timeline-row ${isNow ? 'now' : ''}">
          <div class="timeline-hour">${hourLabel}</div>
          <div class="timeline-cond">${cond}</div>
          <div class="timeline-temp">${temp}</div>
          <div class="timeline-bar ${barClass}"></div>
        </div>`;
    }).join('');
  }

  // Fallback: alert-only timeline when hourly forecast fails
  function renderAlertOnlyTimeline(el, now, currentHour) {
    let html = '';
    for (let i = 0; i < 24; i++) {
      const hourTime = new Date(now);
      hourTime.setMinutes(0, 0, 0);
      hourTime.setHours(currentHour + i);
      const hour = hourTime.getHours();
      const isNow = i === 0;
      const hourLabel = isNow ? 'NOW' : formatHourLabel(hour);
      const severity = alertSeverityAtHour(hourTime);

      html += `
        <div class="timeline-row ${isNow ? 'now' : ''}">
          <div class="timeline-hour">${hourLabel}</div>
          <div class="timeline-cond" style="color:#64748b">—</div>
          <div class="timeline-temp">—</div>
          <div class="timeline-bar ${severity || ''}"></div>
        </div>`;
    }
    el.innerHTML = html;
  }

  function formatHourLabel(hour) {
    if (hour === 0) return '12 AM';
    if (hour === 12) return '12 PM';
    return hour > 12 ? `${hour - 12} PM` : `${hour} AM`;
  }

  function shortenCondition(forecast) {
    if (!forecast) return '—';
    // Shorten common NWS phrases
    return forecast
      .replace('Chance ', '')
      .replace('Slight ', '')
      .replace('Isolated ', '')
      .replace('Scattered ', 'Sct ')
      .replace('Thunderstorms', 'T-Storms')
      .replace('Showers And ', '')
      .replace(' then ', '/')
      .replace('Partly ', 'Ptly ')
      .replace('Mostly ', 'Mstly ');
  }

  // ── Main init ─────────────────────────────────────────────────────────────
  async function init() {
    document.getElementById('timestamp').textContent =
      `Last checked: ${new Date().toLocaleString()}`;

    // Fetch grid info (cached after first call) and alerts in parallel
    const [gridProps] = await Promise.all([
      fetchGridInfo(),
      fetchAlerts()
    ]);

    // Fetch hourly forecast (needs grid data) then render timeline
    const periods = await fetchHourlyForecast(gridProps);
    renderTimeline(periods);
  }

  init();
  setInterval(init, 60000);
</script>
</body>
</html>

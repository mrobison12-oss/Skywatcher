<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyWatcher</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: monospace;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Grid layout ─────────────────────────────────────────── */
    .dashboard {
      display: grid;
      grid-template-columns: 30fr 40fr 30fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      gap: 0;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1e293b;
      background: #0f172a;
    }
    .header h1 { color: #38bdf8; font-size: 18px; }
    .header .phase { color: #64748b; font-size: 12px; margin-left: 0.75rem; }
    .header .timestamp { color: #475569; font-size: 11px; }

    /* ── Columns ─────────────────────────────────────────────── */
    .col {
      padding: 0.75rem;
      overflow-y: auto;
      border-right: 1px solid #1e293b;
    }
    .col:last-child { border-right: none; }

    .col-header {
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
    }

    /* ── Alert cards ─────────────────────────────────────────── */
    .alert-card {
      background: #1e293b;
      border-left: 4px solid #ef4444;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 4px;
    }
    .alert-card.watch { border-left-color: #f59e0b; }
    .alert-card.advisory { border-left-color: #3b82f6; }
    .alert-title { font-weight: bold; color: #f1f5f9; margin-bottom: 0.25rem; font-size: 13px; }
    .alert-meta { color: #94a3b8; font-size: 11px; line-height: 1.4; }
    .clear {
      background: #052e16; border-left: 4px solid #22c55e;
      padding: 0.75rem; border-radius: 4px; color: #86efac; font-size: 12px;
    }

    .in-polygon {
      background: #2d0f0f; border: 1px solid #ef4444;
      padding: 0.15rem 0.5rem; border-radius: 9999px;
      font-size: 10px; color: #fca5a5; display: inline-block; margin-top: 0.35rem;
    }
    .outside-polygon {
      background: #1a2a1a; border: 1px solid #4ade80;
      padding: 0.15rem 0.5rem; border-radius: 9999px;
      font-size: 10px; color: #86efac; display: inline-block; margin-top: 0.35rem;
    }

    /* ── Center column: radar map ────────────────────────────── */
    .col-radar {
      display: flex;
      flex-direction: column;
      padding: 0;
      border-right: 1px solid #1e293b;
      overflow: hidden;
    }

    .col-radar .col-header {
      padding: 0.5rem 0.75rem;
      margin-bottom: 0;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .radar-meta {
      display: flex;
      gap: 1.25rem;
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .radar-meta-item { display: flex; gap: 0.35rem; align-items: baseline; }
    .radar-meta-item .label { color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .radar-meta-item .value { color: #7dd3fc; font-size: 11px; }
    .radar-meta-item .value strong { color: #38bdf8; }

    #radar-map {
      flex: 1;
      min-height: 0;
    }

    .radar-footer {
      padding: 0.3rem 0.75rem;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .radar-footer .radar-legend { display: flex; gap: 0.6rem; align-items: center; font-size: 10px; color: #64748b; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; vertical-align: middle; }

    /* Leaflet overrides for dark theme */
    .leaflet-control-attribution {
      background: rgba(15,23,42,0.75) !important;
      color: #475569 !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: #64748b !important; }
    .leaflet-control-zoom a {
      background: #1e293b !important;
      color: #94a3b8 !important;
      border-color: #334155 !important;
    }
    .leaflet-control-zoom a:hover {
      background: #334155 !important;
      color: #e2e8f0 !important;
    }
    .radar-tooltip {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      color: #94a3b8 !important;
      font-family: monospace !important;
      font-size: 11px !important;
    }

    /* ── Timeline ────────────────────────────────────────────── */
    .timeline-col {
      padding: 0.75rem 0.5rem;
      overflow-y: auto;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 44px 1fr 40px 6px;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      border-radius: 3px;
      height: 27px;
      font-size: 11px;
    }
    .timeline-row.now {
      background: #1e293b;
      outline: 1px solid #38bdf8;
      outline-offset: -1px;
    }
    .timeline-hour { color: #94a3b8; font-size: 11px; white-space: nowrap; }
    .timeline-row.now .timeline-hour { color: #38bdf8; font-weight: bold; }
    .timeline-cond { color: #cbd5e1; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .timeline-temp { color: #e2e8f0; font-size: 11px; text-align: right; }
    .timeline-bar {
      width: 6px;
      height: 20px;
      border-radius: 2px;
      background: #22c55e;
    }
    .timeline-bar.warning { background: #ef4444; }
    .timeline-bar.watch { background: #f59e0b; }
    .timeline-bar.advisory { background: #3b82f6; }
    .timeline-bar.precip { background: #475569; }

    /* ── Threat bar (right column) ───────────────────────────── */
    .threat-bar {
      background: #1e293b;
      padding: 0.5rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
      font-size: 12px;
    }

    /* ── SPC Mesoscale Discussion cards ─────────────────────── */
    .md-card { background: #1e293b; border-left: 3px solid #f59e0b; padding: 0.5rem 0.75rem; margin-bottom: 0.5rem; border-radius: 4px; }
    .md-title { font-size: 12px; color: #f1f5f9; font-weight: bold; }
    .md-label { font-size: 10px; color: #f59e0b; font-weight: normal; background: #2d1f00; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
    .md-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .md-link { font-size: 11px; color: #38bdf8; text-decoration: none; display: inline-block; margin-top: 4px; }
    .md-link:hover { text-decoration: underline; }

    /* ── Status / All-Clear panel ────────────────────────────── */
    .status-clear { background: #052e16; border-left: 4px solid #22c55e; padding: 0.75rem; border-radius: 4px; margin-bottom: 0.75rem; }
    .status-alert { background: #1e293b; border-left: 4px solid #ef4444; padding: 0.75rem; border-radius: 4px; margin-bottom: 0.75rem; }
    .status-icon { font-size: 16px; color: #22c55e; }
    .status-label { font-size: 13px; font-weight: bold; color: #86efac; }
    .status-sub { font-size: 11px; color: #64748b; margin-top: 3px; line-height: 1.4; }
    .status-next { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .status-ts { font-size: 10px; color: #475569; margin-top: 6px; }

    /* ── Error / Loading ─────────────────────────────────────── */
    .error {
      background: #2d1515; border-left: 4px solid #ef4444;
      padding: 0.75rem; border-radius: 4px; color: #fca5a5; font-size: 12px;
    }
    .loading { color: #64748b; font-size: 12px; }

    /* ── Portrait fallback ───────────────────────────────────── */
    @media (max-width: 700px) {
      .dashboard {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
        height: auto;
        overflow-y: auto;
      }
      .col { border-right: none; border-bottom: 1px solid #1e293b; }
      .col-radar { border-right: none; border-bottom: 1px solid #1e293b; height: 340px; }
      body { overflow: auto; }
    }
  </style>
</head>
<body>

<div class="dashboard">
  <!-- Header -->
  <div class="header">
    <div>
      <h1 style="display:inline">SkyWatcher</h1>
      <span class="phase">Phase 3</span>
    </div>
    <div class="timestamp" id="timestamp">Loading...</div>
  </div>

  <!-- Left Column: Alerts + SPC Discussions -->
  <div class="col" id="col-alerts">
    <div class="col-header">Active Alerts</div>
    <div id="alerts" class="loading">Fetching alerts...</div>
    <div class="col-header" style="margin-top:1rem">SPC Discussions</div>
    <div id="spc-mds" class="loading" style="font-size:11px">Loading...</div>
  </div>

  <!-- Center Column: Radar Map -->
  <div class="col-radar" id="col-radar">
    <div class="col-header">
      <span>Radar <span style="color:#475569;font-weight:normal;font-size:10px">NEXRAD N0Q</span></span>
      <span id="radar-frame-indicator" style="color:#475569;font-size:10px"></span>
    </div>

    <div class="radar-meta">
      <div class="radar-meta-item">
        <span class="label">NWS Grid</span>
        <span class="value" id="grid-info"><span class="loading">...</span></span>
      </div>
      <div class="radar-meta-item">
        <span class="label">Threat</span>
        <span class="value" id="threat-summary"><span class="loading">...</span></span>
      </div>
      <div class="radar-meta-item">
        <span class="label">SPC Day 1</span>
        <span class="value" id="spc-outlook-meta"><span class="loading">...</span></span>
      </div>
    </div>

    <div id="radar-map"></div>

    <div class="radar-footer">
      <div class="radar-legend">
        <span class="legend-swatch" style="background:#38bdf8;opacity:0.8"></span>&nbsp;Home
        &nbsp;&nbsp;
        <span class="legend-swatch" style="border:1px dashed #38bdf8;background:transparent"></span>&nbsp;25 mi
        &nbsp;&nbsp;
        <span id="spc-legend" style="display:contents"></span>
      </div>
      <div style="color:#475569;font-size:10px" id="radar-timestamp"></div>
    </div>
  </div>

  <!-- Right Column: Status Panel + Timeline -->
  <div class="col timeline-col" id="col-timeline">
    <div id="status-panel" class="loading" style="font-size:11px">Loading...</div>
    <div class="col-header">24-Hour Threat Timeline</div>
    <div class="threat-bar" id="threat-bar" style="display:none"></div>
    <div id="timeline" class="loading">Fetching forecast...</div>
  </div>
</div>

<script>
  const LAT = 42.3469875;
  const LON = -85.7213594;
  const NWS_USER_AGENT = 'SkyWatcher/1.0 (skywatcher-app)';

  let gridCache = null;
  let activeAlerts = [];

  // ── Radar state ───────────────────────────────────────────────────────────
  let radarMap = null;
  let radarLayers = [];
  let currentFrame = 0;
  let radarAnimInterval = null;
  let radarFrameDates = [];
  let alertPolyLayers = [];

  // ── SPC state ──────────────────────────────────────────────────────────────
  let spcLayer = null;
  let spcLastIssue = null; // ISSUE_ISO of last-drawn outlook — skip redraw if unchanged

  // ── SPC categorical risk styles (DN → display) ────────────────────────────
  // DN codes: 0=no thunder, 2=general thunder, 3=marginal, 4=slight,
  //           5=enhanced, 6=moderate, 8=high
  const SPC_CAT = {
    2: { fill: '#c1e9c1', stroke: '#8db88d', label: 'General Thunder', opacity: 0.22 },
    3: { fill: '#66a366', stroke: '#3d703d', label: 'Marginal',         opacity: 0.28 },
    4: { fill: '#f6f67a', stroke: '#b0b020', label: 'Slight',           opacity: 0.33 },
    5: { fill: '#e7c580', stroke: '#b07020', label: 'Enhanced',         opacity: 0.38 },
    6: { fill: '#e55c5c', stroke: '#a01010', label: 'Moderate',         opacity: 0.43 },
    8: { fill: '#ff79ff', stroke: '#cc00cc', label: 'High',             opacity: 0.50 },
  };

  // ── Point-in-polygon (Ray Casting) ────────────────────────────────────────
  function pointInPolygon(lat, lon, polygon) {
    let inside = false;
    const x = lon, y = lat;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      const xi = polygon[i][0], yi = polygon[i][1];
      const xj = polygon[j][0], yj = polygon[j][1];
      const intersect = ((yi > y) !== (yj > y)) &&
                        (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function homeInGeometry(geometry) {
    if (!geometry) return false;
    if (geometry.type === 'Polygon') {
      return pointInPolygon(LAT, LON, geometry.coordinates[0]);
    }
    if (geometry.type === 'MultiPolygon') {
      return geometry.coordinates.some(poly => pointInPolygon(LAT, LON, poly[0]));
    }
    return false;
  }

  // ── Alert classification ──────────────────────────────────────────────────
  function alertClass(event) {
    const e = (event || '').toLowerCase();
    if (e.includes('warning')) return 'warning';
    if (e.includes('watch'))   return 'watch';
    return 'advisory';
  }

  function formatExpiry(isoString) {
    if (!isoString) return 'No expiry';
    const d = new Date(isoString);
    return d.toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
    });
  }

  // ── Determine highest alert severity active during a given hour ───────────
  function alertSeverityAtHour(hourStart) {
    const hourEnd = new Date(hourStart.getTime() + 3600000);
    const severityOrder = { warning: 0, watch: 1, advisory: 2 };
    let highest = null;

    for (const alert of activeAlerts) {
      const p = alert.properties;
      const effective = new Date(p.effective || p.sent);
      const expires = p.expires ? new Date(p.expires) : new Date(effective.getTime() + 86400000);

      if (effective < hourEnd && expires > hourStart) {
        const cls = alertClass(p.event);
        if (highest === null || severityOrder[cls] < severityOrder[highest]) {
          highest = cls;
        }
      }
    }
    return highest;
  }

  // ── Fetch NWS grid metadata ───────────────────────────────────────────────
  async function fetchGridInfo() {
    const el = document.getElementById('grid-info');
    try {
      if (gridCache) { renderGrid(el, gridCache); return gridCache; }
      const res = await fetch(
        `https://api.weather.gov/points/${LAT},${LON}`,
        { headers: { 'User-Agent': NWS_USER_AGENT, 'Accept': 'application/geo+json' } }
      );
      if (!res.ok) throw new Error(`NWS returned ${res.status}`);
      const data = await res.json();
      gridCache = data.properties;
      renderGrid(el, gridCache);
      return gridCache;
    } catch (err) {
      el.innerHTML = `<span class="error">Grid fetch failed: ${err.message}</span>`;
      return null;
    }
  }

  function renderGrid(el, p) {
    el.innerHTML =
      `<strong>${p.cwa}</strong> ${p.gridX},${p.gridY} &nbsp;|&nbsp; ` +
      `Zone ${p.forecastZone?.split('/').pop() || 'N/A'}`;
  }

  // ── Fetch active alerts ───────────────────────────────────────────────────
  async function fetchAlerts() {
    const el = document.getElementById('alerts');
    try {
      const res = await fetch(
        `https://api.weather.gov/alerts/active?point=${LAT},${LON}`,
        { headers: { 'User-Agent': NWS_USER_AGENT, 'Accept': 'application/geo+json' } }
      );
      if (!res.ok) throw new Error(`NWS returned ${res.status}`);
      const data = await res.json();
      activeAlerts = data.features || [];

      if (activeAlerts.length === 0) {
        el.innerHTML = `<div class="clear">No active watches, warnings, or advisories.</div>`;
        updateThreatSummary();
        renderAlertPolygons();
        return;
      }

      const order = { warning: 0, watch: 1, advisory: 2 };
      activeAlerts.sort((a, b) => {
        const ac = alertClass(a.properties.event);
        const bc = alertClass(b.properties.event);
        return (order[ac] ?? 3) - (order[bc] ?? 3);
      });

      el.innerHTML = activeAlerts.map(alert => {
        const p = alert.properties;
        const geo = alert.geometry;
        const inPoly = homeInGeometry(geo);
        const polyBadge = geo
          ? (inPoly
              ? '<span class="in-polygon">HOME INSIDE POLYGON</span>'
              : '<span class="outside-polygon">Outside polygon</span>')
          : '<span style="color:#64748b;font-size:10px">Zone-based (no polygon)</span>';

        return `
          <div class="alert-card ${alertClass(p.event)}">
            <div class="alert-title">${p.event}</div>
            <div class="alert-meta">
              ${p.headline || p.description?.substring(0, 100) || 'No headline'}
            </div>
            <div class="alert-meta" style="margin-top:0.25rem">
              Expires: ${formatExpiry(p.expires)}
            </div>
            ${polyBadge}
          </div>`;
      }).join('');

      updateThreatSummary();
      renderAlertPolygons();

    } catch (err) {
      el.innerHTML = `<div class="error">Alert fetch failed: ${err.message}</div>`;
      activeAlerts = [];
      updateThreatSummary();
      renderAlertPolygons();
    }
  }

  // ── Threat summary ────────────────────────────────────────────────────────
  function updateThreatSummary() {
    const el  = document.getElementById('threat-summary');
    const bar = document.getElementById('threat-bar');

    if (activeAlerts.length === 0) {
      el.innerHTML = '<span style="color:#86efac">All clear</span>';
      if (bar) bar.style.display = 'none';
      return;
    }

    const warnings   = activeAlerts.filter(a => alertClass(a.properties.event) === 'warning').length;
    const watches    = activeAlerts.filter(a => alertClass(a.properties.event) === 'watch').length;
    const advisories = activeAlerts.filter(a => alertClass(a.properties.event) === 'advisory').length;

    const parts = [];
    if (warnings)   parts.push(`<span style="color:#ef4444">${warnings} warning${warnings > 1 ? 's' : ''}</span>`);
    if (watches)    parts.push(`<span style="color:#f59e0b">${watches} watch${watches > 1 ? 'es' : ''}</span>`);
    if (advisories) parts.push(`<span style="color:#3b82f6">${advisories} advisory</span>`);

    const joined = parts.join(' &nbsp;');
    el.innerHTML = joined;
    if (bar) { bar.style.display = 'block'; bar.innerHTML = joined; }
  }

  // ── Fetch hourly forecast ─────────────────────────────────────────────────
  async function fetchHourlyForecast(gridProps) {
    try {
      const gridX = gridProps ? gridProps.gridX : 41;
      const gridY = gridProps ? gridProps.gridY : 19;
      const cwa   = gridProps ? gridProps.cwa   : 'GRR';

      const res = await fetch(
        `https://api.weather.gov/gridpoints/${cwa}/${gridX},${gridY}/forecast/hourly`,
        { headers: { 'User-Agent': NWS_USER_AGENT, 'Accept': 'application/geo+json' } }
      );
      if (!res.ok) throw new Error(`NWS returned ${res.status}`);
      const data = await res.json();
      return data.properties.periods || [];
    } catch (err) {
      return null;
    }
  }

  // ── Render timeline ───────────────────────────────────────────────────────
  function renderTimeline(periods) {
    const el = document.getElementById('timeline');
    const now = new Date();
    const currentHour = now.getHours();

    if (!periods) {
      renderAlertOnlyTimeline(el, now, currentHour);
      return;
    }

    const hours = periods.slice(0, 24);
    el.innerHTML = hours.map((period, i) => {
      const startTime = new Date(period.startTime);
      const isNow = i === 0;
      const hourLabel = isNow ? 'NOW' : formatHourLabel(startTime.getHours());
      const temp = `${period.temperature}°`;
      const cond = shortenCondition(period.shortForecast);
      const severity = alertSeverityAtHour(startTime);
      let barClass = '';
      if (severity) {
        barClass = severity;
      } else if (period.probabilityOfPrecipitation?.value >= 30) {
        barClass = 'precip';
      }
      return `
        <div class="timeline-row ${isNow ? 'now' : ''}">
          <div class="timeline-hour">${hourLabel}</div>
          <div class="timeline-cond">${cond}</div>
          <div class="timeline-temp">${temp}</div>
          <div class="timeline-bar ${barClass}"></div>
        </div>`;
    }).join('');
  }

  function renderAlertOnlyTimeline(el, now, currentHour) {
    let html = '';
    for (let i = 0; i < 24; i++) {
      const hourTime = new Date(now);
      hourTime.setMinutes(0, 0, 0);
      hourTime.setHours(currentHour + i);
      const isNow = i === 0;
      const hourLabel = isNow ? 'NOW' : formatHourLabel(hourTime.getHours());
      const severity = alertSeverityAtHour(hourTime);
      html += `
        <div class="timeline-row ${isNow ? 'now' : ''}">
          <div class="timeline-hour">${hourLabel}</div>
          <div class="timeline-cond" style="color:#64748b">—</div>
          <div class="timeline-temp">—</div>
          <div class="timeline-bar ${severity || ''}"></div>
        </div>`;
    }
    el.innerHTML = html;
  }

  function formatHourLabel(hour) {
    if (hour === 0)  return '12 AM';
    if (hour === 12) return '12 PM';
    return hour > 12 ? `${hour - 12} PM` : `${hour} AM`;
  }

  function shortenCondition(forecast) {
    if (!forecast) return '—';
    return forecast
      .replace('Chance ', '').replace('Slight ', '').replace('Isolated ', '')
      .replace('Scattered ', 'Sct ').replace('Thunderstorms', 'T-Storms')
      .replace('Showers And ', '').replace(' then ', '/')
      .replace('Partly ', 'Ptly ').replace('Mostly ', 'Mstly ');
  }

  // ── Alert polygon overlays on map ─────────────────────────────────────────
  const ALERT_POLY_STYLE = {
    warning:  { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.12, weight: 1.5, opacity: 0.7 },
    watch:    { color: '#f59e0b', fillColor: '#f59e0b', fillOpacity: 0.10, weight: 1.5, opacity: 0.7 },
    advisory: { color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.08, weight: 1.5, opacity: 0.7 }
  };

  function renderAlertPolygons() {
    // Retry if map isn't initialized yet — guards against the race where
    // alert fetch completes before initRadarMap() has run.
    if (!radarMap) { setTimeout(renderAlertPolygons, 200); return; }

    // Clear existing alert polygons
    alertPolyLayers.forEach(l => radarMap.removeLayer(l));
    alertPolyLayers = [];

    for (const alert of activeAlerts) {
      const geo = alert.geometry;
      if (!geo) continue; // zone-based alerts have no polygon

      const cls = alertClass(alert.properties.event);
      const style = ALERT_POLY_STYLE[cls] || ALERT_POLY_STYLE.advisory;

      // Convert NWS GeoJSON coords [lon, lat] → Leaflet [lat, lon]
      const toLatLng = ring => ring.map(([lon, lat]) => [lat, lon]);

      let layer;
      if (geo.type === 'Polygon') {
        layer = L.polygon(toLatLng(geo.coordinates[0]), style);
      } else if (geo.type === 'MultiPolygon') {
        const rings = geo.coordinates.map(poly => toLatLng(poly[0]));
        layer = L.polygon(rings, style);
      } else {
        continue;
      }

      layer.bindTooltip(alert.properties.event, {
        sticky: true,
        className: 'radar-tooltip'
      });
      layer.addTo(radarMap);
      alertPolyLayers.push(layer);
    }
  }

  // ── SPC Convective Outlook (Day 1 categorical) ────────────────────────────
  // Fetches the direct GeoJSON (no ZIP) from SPC. Cache-busted every 30 min
  // to match SPC's update cadence. Skips redraw if ISSUE_ISO is unchanged.
  async function fetchSpcOutlook() {
    const metaEl = document.getElementById('spc-outlook-meta');
    try {
      const bust = Math.floor(Date.now() / 1800000); // changes every 30 min
      const res = await fetch(
        `https://www.spc.noaa.gov/products/outlook/day1otlk_cat.nolyr.geojson?_=${bust}`,
        { headers: { 'User-Agent': NWS_USER_AGENT } }
      );
      if (!res.ok) throw new Error(`SPC GeoJSON ${res.status}`);
      const geojson = await res.json();

      const features = geojson.features || [];
      const issueIso = features[0]?.properties?.ISSUE_ISO || null;

      // Skip full redraw if data hasn't changed since last fetch
      if (issueIso && issueIso === spcLastIssue && spcLayer) {
        return;
      }
      spcLastIssue = issueIso;

      // Remove previous layer
      if (spcLayer) { radarMap.removeLayer(spcLayer); spcLayer = null; }

      // Features with actual geometry and a renderable risk level (DN >= 2)
      const riskFeatures = features.filter(f => {
        const dn = f.properties?.DN;
        if (!dn || dn < 2) return false;
        const geo = f.geometry;
        if (!geo) return false;
        if (geo.type === 'GeometryCollection') return (geo.geometries?.length || 0) > 0;
        return true;
      });

      if (riskFeatures.length === 0) {
        if (metaEl) metaEl.innerHTML = '<span style="color:#86efac">No thunderstorms</span>';
        updateSpcLegend([]);
        return;
      }

      spcLayer = L.geoJSON(
        { type: 'FeatureCollection', features: riskFeatures },
        {
          pane: 'spcPane',
          style: f => {
            const s = SPC_CAT[f.properties?.DN] || { fill: '#888', stroke: '#555', opacity: 0.2 };
            return { color: s.stroke, fillColor: s.fill, fillOpacity: s.opacity, weight: 1, opacity: 0.8 };
          },
          onEachFeature: (f, layer) => {
            const cat = SPC_CAT[f.properties?.DN];
            layer.bindTooltip(`SPC: ${cat?.label || f.properties?.LABEL || 'Risk area'}`,
              { sticky: true, className: 'radar-tooltip' });
          },
        }
      ).addTo(radarMap);

      // Update meta strip
      const highestDN = Math.max(...riskFeatures.map(f => f.properties?.DN || 0));
      const cat = SPC_CAT[highestDN];
      const issued = issueIso ? new Date(issueIso) : null;
      const forecaster = features[0]?.properties?.FORECASTER || '';
      if (metaEl) {
        metaEl.innerHTML =
          `<strong style="color:${cat?.fill || '#94a3b8'}">${cat?.label || 'Active'}</strong>` +
          (issued ? ` <span style="color:#64748b">· ${issued.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' })}</span>` : '');
      }
      updateSpcLegend(riskFeatures);

    } catch (err) {
      console.warn('SPC outlook fetch failed:', err);
      if (metaEl) metaEl.textContent = 'SPC unavailable';
    }
  }

  function updateSpcLegend(riskFeatures) {
    const el = document.getElementById('spc-legend');
    if (!el) return;
    if (riskFeatures.length === 0) { el.innerHTML = ''; return; }
    const dns = [...new Set(riskFeatures.map(f => f.properties?.DN).filter(Boolean))].sort((a, b) => a - b);
    el.innerHTML = dns.map(dn => {
      const s = SPC_CAT[dn];
      if (!s) return '';
      return `&nbsp;<span class="legend-swatch" style="background:${s.fill};border:1px solid ${s.stroke}"></span>${s.label}`;
    }).join('');
  }

  // ── SPC Mesoscale Discussions (RSS) ───────────────────────────────────────
  // Parses the SPC RSS XML feed. Active MDs are individual <item> entries whose
  // GUID contains /md/md#### (vs. the status-only item whose GUID has a date).
  // pubDate is surfaced as relative age; items > 4h old are flagged as potentially stale.
  async function fetchSpcRss() {
    const el = document.getElementById('spc-mds');
    if (!el) return;
    try {
      const res = await fetch('https://www.spc.noaa.gov/products/spcrss.xml',
        { headers: { 'Cache-Control': 'no-cache', 'User-Agent': NWS_USER_AGENT } }
      );
      if (!res.ok) throw new Error(`SPC RSS ${res.status}`);
      const text = await res.text();
      const doc = new DOMParser().parseFromString(text, 'text/xml');
      const allItems = [...doc.querySelectorAll('item')];

      // Individual MDs have GUIDs matching /md/md#### (not just the date-keyed status item)
      const mdItems = allItems.filter(item =>
        /\/md\/md\d+/i.test(item.querySelector('guid')?.textContent || '')
      );

      renderMesoscaleDiscussions(el, mdItems);
    } catch (err) {
      console.warn('SPC RSS fetch failed:', err);
      el.innerHTML = '<div style="color:#64748b;font-size:11px">MD feed unavailable</div>';
    }
  }

  function renderMesoscaleDiscussions(el, mdItems) {
    if (mdItems.length === 0) {
      el.innerHTML = '<div style="color:#475569;font-size:11px">No MDs in effect</div>';
      return;
    }
    el.innerHTML = mdItems.map(item => {
      const title   = item.querySelector('title')?.textContent || 'SPC MD';
      const link    = item.querySelector('link')?.textContent || '#';
      const pubStr  = item.querySelector('pubDate')?.textContent;
      const pubDate = pubStr ? new Date(pubStr) : null;
      const mdNum   = title.match(/\d+/)?.[0] || '?';
      const ageStr  = pubDate ? relativeTime(pubDate) : '';
      const staleWarn = pubDate && ageOlderThan(pubDate, 4)
        ? ' · <span style="color:#f59e0b">may be stale</span>' : '';

      return `<div class="md-card">
        <div class="md-title">MD #${mdNum} <span class="md-label">Pre-Watch Signal</span></div>
        <div class="md-meta">${ageStr}${staleWarn}</div>
        <a href="${link}" target="_blank" rel="noopener" class="md-link">View Discussion →</a>
      </div>`;
    }).join('');
  }

  // ── All-Clear / Status panel ───────────────────────────────────────────────
  // Computed from already-fetched alert and forecast data — no new API call.
  // Shows clear state with next risk hint, or active alert summary.
  // Timestamp is always surfaced so user can judge data freshness.
  function renderAllClearPanel(periods) {
    const el = document.getElementById('status-panel');
    if (!el) return;
    const checkedAt = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });

    if (activeAlerts.length === 0) {
      let nextRisk = null;
      if (periods) {
        const risky = periods.find(p =>
          (p.probabilityOfPrecipitation?.value >= 40) ||
          /thunderstorm|t-storm/i.test(p.shortForecast || '')
        );
        if (risky) {
          const t = new Date(risky.startTime);
          nextRisk = `${t.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })} — ${risky.shortForecast}`;
        }
      }
      el.innerHTML = `<div class="status-clear">
        <span class="status-icon">✓</span> <span class="status-label">All Clear</span>
        <div class="status-sub">No active NWS alerts for this location.</div>
        ${nextRisk
          ? `<div class="status-next">Next risk: <strong>${nextRisk}</strong></div>`
          : `<div class="status-sub" style="margin-top:4px">No significant risk in next 24h.</div>`}
        <div class="status-ts">Confirmed at ${checkedAt}</div>
      </div>`;
    } else {
      const order = { warning: 0, watch: 1, advisory: 2 };
      const highest = activeAlerts.reduce((acc, a) => {
        const cls = alertClass(a.properties.event);
        return (order[cls] ?? 3) < (order[acc] ?? 3) ? cls : acc;
      }, 'advisory');
      const colors = { warning: '#ef4444', watch: '#f59e0b', advisory: '#3b82f6' };
      const color = colors[highest] || '#94a3b8';
      el.innerHTML = `<div class="status-alert" style="border-left-color:${color}">
        <div class="status-label" style="color:${color}">${activeAlerts.length} Active Alert${activeAlerts.length > 1 ? 's' : ''}</div>
        <div class="status-sub">${activeAlerts.map(a => a.properties.event).join(' · ')}</div>
        <div class="status-ts">As of ${checkedAt}</div>
      </div>`;
    }
  }

  // ── Time helpers ──────────────────────────────────────────────────────────
  function relativeTime(date) {
    const mins = Math.floor((Date.now() - date.getTime()) / 60000);
    if (mins < 2) return 'Just issued';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    return `${hrs}h ${mins % 60}m ago`;
  }

  function ageOlderThan(date, hours) {
    return (Date.now() - date.getTime()) > hours * 3600000;
  }

  // ── Radar map ─────────────────────────────────────────────────────────────

  function initRadarMap() {
    radarMap = L.map('radar-map', {
      center: [LAT, LON],
      zoom: 8,
      zoomControl: true,
      attributionControl: true
    });

    // Custom pane for SPC outlook polygons: sits above tile layers (z-index 200)
    // but below Leaflet's default overlayPane (z-index 400) where alert polys live.
    // This keeps radar tiles visible on top of SPC fills, and alert polys on top of both.
    radarMap.createPane('spcPane');
    radarMap.getPane('spcPane').style.zIndex = 300;

    // Dark base: CartoDB Dark Matter (no labels — county overlay adds context)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 13,
      attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/">OSM</a>'
    }).addTo(radarMap);

    // County + state outlines (IEM, zIndex below radar)
    L.tileLayer(
      'https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/usnws_county/{z}/{x}/{y}.png',
      { opacity: 0.35, zIndex: 100 }
    ).addTo(radarMap);

    // State boundaries slightly brighter
    L.tileLayer(
      'https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/usnws_state/{z}/{x}/{y}.png',
      { opacity: 0.5, zIndex: 101 }
    ).addTo(radarMap);

    // 25-mile range ring (25 mi = 40,234 m)
    L.circle([LAT, LON], {
      radius: 40234,
      color: '#38bdf8',
      fill: false,
      weight: 1,
      opacity: 0.5,
      dashArray: '5 5'
    }).addTo(radarMap);

    // Home pin
    const homeIcon = L.divIcon({
      html: '<div style="width:9px;height:9px;background:#38bdf8;border:2px solid #0f172a;border-radius:50%;box-shadow:0 0 5px #38bdf8;"></div>',
      className: '',
      iconSize: [9, 9],
      iconAnchor: [4, 4]
    });
    L.marker([LAT, LON], { icon: homeIcon })
      .bindTooltip('Alamo Township, MI', {
        permanent: false,
        direction: 'right',
        className: 'radar-tooltip'
      })
      .addTo(radarMap);

    loadRadarFrames();
  }

  // Fetch server-confirmed frame timestamps from RainViewer, then build tile layers.
  // Using the API manifest avoids guessing timestamps that may not have tiles yet —
  // the root cause of the blank radar with the old IEM timestamp-construction approach.
  async function loadRadarFrames() {
    if (radarAnimInterval) clearInterval(radarAnimInterval);
    radarLayers.forEach(l => radarMap.removeLayer(l));
    radarLayers = [];

    let frames;
    try {
      const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
      if (!res.ok) throw new Error(`RainViewer returned ${res.status}`);
      const data = await res.json();
      const host = data.host;
      // Use last 6 of the past frames (oldest→newest for animation)
      const past = data.radar.past.slice(-6);
      frames = past.map(f => ({
        url: `${host}${f.path}/256/{z}/{x}/{y}/6/1_1.png`,
        date: new Date(f.time * 1000)
      }));
    } catch (err) {
      console.warn('RainViewer manifest fetch failed:', err);
      document.getElementById('radar-timestamp').textContent = 'Radar unavailable';
      return;
    }

    radarFrameDates = frames.map(f => f.date);
    frames.forEach((frame, i) => {
      const layer = L.tileLayer(frame.url, {
        opacity: 0,
        zIndex: 200 + i,
        attribution: 'Radar: <a href="https://www.rainviewer.com/">RainViewer</a>'
      });
      layer.addTo(radarMap);
      radarLayers.push(layer);
    });

    currentFrame = 0;
    startAnimation();
  }

  function startAnimation() {
    // Show first frame immediately
    if (radarLayers.length > 0) {
      radarLayers[0].setOpacity(0.75);
      updateRadarFooter();
    }

    radarAnimInterval = setInterval(() => {
      radarLayers[currentFrame].setOpacity(0);
      currentFrame = (currentFrame + 1) % radarLayers.length;
      radarLayers[currentFrame].setOpacity(0.75);
      updateRadarFooter();
    }, 500);
  }

  function updateRadarFooter() {
    const indicator = document.getElementById('radar-frame-indicator');
    const tsEl      = document.getElementById('radar-timestamp');

    if (indicator) indicator.textContent = `${currentFrame + 1} / ${radarLayers.length}`;

    if (tsEl && radarFrameDates[currentFrame]) {
      const t = radarFrameDates[currentFrame];
      tsEl.textContent = t.toLocaleTimeString('en-US', {
        hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
      });
    }
  }

  // ── Main init ─────────────────────────────────────────────────────────────
  async function init() {
    document.getElementById('timestamp').textContent =
      `Last checked: ${new Date().toLocaleString()}`;

    // NWS alerts and SPC RSS run in parallel; grid is needed before hourly forecast
    const [gridProps] = await Promise.all([
      fetchGridInfo(),
      fetchAlerts(),
      fetchSpcRss(),    // ~60s refresh is fine — SPC RSS has ttl=1 (updates every minute)
    ]);

    const periods = await fetchHourlyForecast(gridProps);
    renderTimeline(periods);
    renderAllClearPanel(periods); // computed from already-fetched alert and forecast data
  }

  // Leaflet is synchronously loaded in <head>; script is at end of <body>,
  // so DOM and Leaflet are both available here — no need for window.load.
  // invalidateSize() is still deferred so flex layout dimensions are resolved.
  initRadarMap();
  setTimeout(() => radarMap && radarMap.invalidateSize(), 150);
  setInterval(() => loadRadarFrames(), 5 * 60 * 1000);

  fetchSpcOutlook();                                  // on startup
  setInterval(fetchSpcOutlook, 30 * 60 * 1000);      // every 30 min — matches SPC cadence

  init();
  setInterval(init, 60000);
</script>
</body>
</html>
